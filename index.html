<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holiday Finder ✈️</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.container {
  max-width:800px;
  margin:auto;
  padding:30px;
  text-align:center;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

button.selected {
  background:#38bdf8;
  color:black;
}

button:hover {
  background:#0ea5e9;
}

.hidden {display:none;}

.card {
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

img {
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

.cta {
  background:#22c55e;
  color:black;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:60%;
}

.price {
  color:#22c55e;
}
</style>
</head>

<body>

<div class="container">

<h1>Find Your Perfect Holiday ✈️</h1>

<div id="quiz">

<p>Weather?</p>
<button onclick="select(this,'hot')">Hot ☀️</button>
<button onclick="select(this,'cold')">Cold ❄️</button>

<p>Trip type?</p>
<button onclick="select(this,'relax')">Relax 🏖️</button>
<button onclick="select(this,'adventure')">Adventure 🏔️</button>
<button onclick="select(this,'city')">City 🏙️</button>

<p>Budget?</p>
<button onclick="select(this,'low')">Low 💸</button>
<button onclick="select(this,'high')">Luxury 💎</button>

<br><br>
<button onclick="getResult()">Find My Trip</button>

</div>

<div id="result" class="hidden">

<h1 id="title"></h1>
<img id="image">
<p id="desc"></p>
<p id="why"></p>

<p class="price" id="price"></p>

<p style="color:#22c55e;">🔥 Popular choice right now</p>

<h2>Top Hotels</h2>
<div id="hotels"></div>

<h3>Get your personalised 5-day travel plan ✈️</h3>
<input id="email" placeholder="Enter your email">
<br>
<button class="cta" onclick="captureEmail()">Send My Plan</button>

<br><br>
<button onclick="restart()">Start Again</button>

</div>

</div>

<script>

let answers = [];

function select(btn, value){
  btn.classList.toggle("selected");
  answers.push(value);
}

const data = {

  bali:{
    img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
    desc:"Relax in a tropical paradise.",
    why:"Perfect for your warm + relaxation preferences.",
    price:"Trips from £600",
    hotels:[
      {n:"Four Seasons Bali", link:"https://www.booking.com"},
      {n:"Bulgari Resort", link:"https://www.booking.com"},
      {n:"Ayodya Resort", link:"https://www.booking.com"}
    ]
  },

  dubai:{
    img:"https://images.unsplash.com/photo-1512453979798-5ea266f8880c",
    desc:"Luxury and adventure combined.",
    why:"Matches your high-energy + luxury vibe.",
    price:"Trips from £800",
    hotels:[
      {n:"Atlantis The Palm", link:"https://www.booking.com"},
      {n:"Burj Al Arab", link:"https://www.booking.com"},
      {n:"Rove Downtown", link:"https://www.booking.com"}
    ]
  },

  paris:{
    img:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34",
    desc:"Romantic cultural escape.",
    why:"Ideal for city lovers.",
    price:"Trips from £500",
    hotels:[
      {n:"Ritz Paris", link:"https://www.booking.com"},
      {n:"Hotel Regina", link:"https://www.booking.com"}
    ]
  }

};

function getResult(){

  let score={bali:0,dubai:0,paris:0};

  answers.forEach(a=>{
    if(a==="hot"){score.bali+=2;score.dubai+=2;}
    if(a==="cold"){score.paris+=2;}
    if(a==="relax"){score.bali+=3;}
    if(a==="adventure"){score.dubai+=3;}
    if(a==="city"){score.paris+=2;}
    if(a==="high"){score.dubai+=2;}
  });

  let dest=Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("title").innerText=dest.toUpperCase();
  document.getElementById("desc").innerText=data[dest].desc;
  document.getElementById("why").innerText=data[dest].why;
  document.getElementById("price").innerText=data[dest].price;
  document.getElementById("image").src=data[dest].img;

  let html="";
  data[dest].hotels.forEach(h=>{
    html+=`
    <div class="card">
      <h3>${h.n}</h3>
      <button class="cta" onclick="window.open('${h.link}')">Book Best Price</button>
    </div>`;
  });

  document.getElementById("hotels").innerHTML=html;
}

function captureEmail(){
  let email=document.getElementById("email").value;
  if(email){
    alert("Your personalised plan is on its way to "+email);
  }
}

function restart(){
  location.reload();
}

</script>

</body>
</html>
