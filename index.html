<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holiday Finder</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#000;
  color:white;
}

/* HERO */
.hero {
  height:100vh;
  background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {font-size:48px;}
.hero button {
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:white;
  color:black;
  cursor:pointer;
}

/* QUIZ */
.quiz, .result, .hotel-page {
  display:none;
  padding:40px;
  text-align:center;
}

button.option {
  display:block;
  width:100%;
  max-width:400px;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
  border:none;
  background:#111;
  color:white;
}

button.option.selected {
  background:white;
  color:black;
}

/* HOTEL LIST */
.hotel {
  display:flex;
  margin-top:15px;
  background:#111;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}

.hotel img {
  width:120px;
  object-fit:cover;
}

.hotel-info {
  padding:10px;
  text-align:left;
}

/* HOTEL DETAIL */
.hotel-page img {
  width:100%;
  border-radius:20px;
}

.hidden {display:none;}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="home">
  <h1>Find your perfect holiday</h1>
  <button onclick="start()">Start</button>
</div>

<!-- QUIZ -->
<div class="quiz" id="quiz">

<h2>Weather?</h2>
<button class="option" onclick="select('weather','hot',this)">Hot</button>
<button class="option" onclick="select('weather','cold',this)">Cold</button>

<h2>Trip type?</h2>
<button class="option" onclick="select('type','relax',this)">Relax</button>
<button class="option" onclick="select('type','adventure',this)">Adventure</button>
<button class="option" onclick="select('type','city',this)">City</button>

<h2>Budget?</h2>
<button class="option" onclick="select('budget','low',this)">Low</button>
<button class="option" onclick="select('budget','high',this)">Luxury</button>

<h2>Travel with?</h2>
<button class="option" onclick="select('group','solo',this)">Solo</button>
<button class="option" onclick="select('group','couple',this)">Couple</button>
<button class="option" onclick="select('group','family',this)">Family</button>

<button onclick="getResult()">Find Trip</button>

</div>

<!-- RESULTS -->
<div class="result" id="result">
<h1 id="destName"></h1>
<p id="destDesc"></p>

<h2>Top Hotels</h2>
<div id="hotelList"></div>

<button onclick="location.reload()">Start Again</button>
</div>

<!-- HOTEL DETAIL -->
<div class="hotel-page" id="hotelPage">
<img id="hotelImg">
<h1 id="hotelName"></h1>
<p id="hotelDesc"></p>
<p id="hotelPrice"></p>
<button onclick="back()">Back</button>
</div>

<script>

let answers={};

function start(){
  home.style.display="none";
  quiz.style.display="block";
}

function select(cat,val,btn){
  answers[cat]=val;
  let buttons=btn.parentElement.querySelectorAll("button");
  buttons.forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

const data={
  dubai:{
    desc:"Luxury and adventure",
    hotels:[
      {
        name:"Atlantis The Palm",
        img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b",
        desc:"Iconic luxury resort with waterpark",
        price:"£400/night"
      },
      {
        name:"Burj Al Arab",
        img:"https://images.unsplash.com/photo-1584132967334-10e028bd69f7",
        desc:"World-famous 7-star hotel",
        price:"£1000/night"
      }
    ]
  },

  bali:{
    desc:"Relaxing tropical paradise",
    hotels:[
      {
        name:"Four Seasons Bali",
        img:"https://images.unsplash.com/photo-1566073771259-6a8506099945",
        desc:"Private villas in jungle setting",
        price:"£500/night"
      },
      {
        name:"Bulgari Resort",
        img:"https://images.unsplash.com/photo-1551882547-ff40c63fe5fa",
        desc:"Luxury cliffside villas",
        price:"£800/night"
      }
    ]
  }
};

function getResult(){

  let dest="bali";
  if(answers.type==="adventure" || answers.budget==="high") dest="dubai";

  quiz.style.display="none";
  result.style.display="block";

  destName.innerText=dest.toUpperCase();
  destDesc.innerText=data[dest].desc;

  let html="";
  data[dest].hotels.forEach((h,i)=>{
    html+=`
    <div class="hotel" onclick="openHotel('${dest}',${i})">
      <img src="${h.img}">
      <div class="hotel-info">
        <h3>${h.name}</h3>
        <p>${h.price}</p>
      </div>
    </div>`;
  });

  hotelList.innerHTML=html;
}

function openHotel(dest,i){
  let h=data[dest].hotels[i];

  result.style.display="none";
  hotelPage.style.display="block";

  hotelImg.src=h.img;
  hotelName.innerText=h.name;
  hotelDesc.innerText=h.desc;
  hotelPrice.innerText=h.price;
}

function back(){
  hotelPage.style.display="none";
  result.style.display="block";
}

</script>

</body>
</html>
