<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holiday Finder</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#000;
  color:white;
}

.center {
  text-align:center;
  padding:40px 20px;
}

button {
  display:block;
  width:100%;
  max-width:400px;
  margin:10px auto;
  padding:15px;
  border-radius:12px;
  border:none;
  background:#111;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button.selected {
  background:white;
  color:black;
}

.cta {
  background:linear-gradient(135deg,#38bdf8,#6366f1);
  color:white;
  font-size:18px;
  padding:18px;
  border-radius:30px;
}

img {
  width:100%;
  border-radius:20px;
  margin-top:20px;
}

.hotel {
  display:flex;
  margin-top:15px;
  background:#111;
  border-radius:15px;
  overflow:hidden;
}

.hotel img {
  width:120px;
  object-fit:cover;
}

.hotel-info {
  padding:10px;
}

.hidden {display:none;}
</style>
</head>

<body>

<div class="center" id="quiz">

<h2>Step 1: Weather</h2>
<button onclick="select('weather','hot',this)">Hot ☀️</button>
<button onclick="select('weather','cold',this)">Cold ❄️</button>

<h2>Step 2: Trip Type</h2>
<button onclick="select('type','relax',this)">Relax 🏖️</button>
<button onclick="select('type','adventure',this)">Adventure 🏔️</button>
<button onclick="select('type','city',this)">City 🏙️</button>

<h2>Step 3: Budget</h2>
<button onclick="select('budget','low',this)">Budget 💸</button>
<button onclick="select('budget','high',this)">Luxury 💎</button>

<button class="cta" onclick="getResult()">✨ Find My Perfect Trip</button>

</div>

<div class="center hidden" id="result">
<img id="img">
<h1 id="title"></h1>
<p id="desc"></p>

<h2>Top stays</h2>
<div id="hotels"></div>

<button onclick="location.reload()">Start again</button>
</div>

<script>

let answers={
  weather:null,
  type:null,
  budget:null
};

function select(category,value,btn){

  answers[category]=value;

  let buttons=btn.parentElement.querySelectorAll("button");
  buttons.forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");
}

const data={
  bali:{
    img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
    desc:"Perfect for relaxing tropical escapes.",
    hotels:[
      "Four Seasons Bali","Bulgari Resort","Ayodya Resort",
      "Alila Villas","The Legian Bali","Padma Resort",
      "The Mulia","Hard Rock Bali","Kuta Beach Hotel","Samabe Bali"
    ]
  },

  dubai:{
    img:"https://images.unsplash.com/photo-1512453979798-5ea266f8880c",
    desc:"Luxury, shopping, and adventure.",
    hotels:[
      "Atlantis The Palm","Burj Al Arab","Jumeirah Beach Hotel",
      "Rove Downtown","Armani Hotel Dubai","Address Sky View",
      "Five Palm Jumeirah","Sofitel Dubai","Hilton Dubai","W Dubai"
    ]
  },

  paris:{
    img:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34",
    desc:"Romantic and cultural city.",
    hotels:[
      "Ritz Paris","Hotel Regina","Le Meurice",
      "Hotel Lutetia","Shangri-La Paris","Hotel Crillon",
      "Pullman Paris","Ibis Paris","Novotel Paris","CitizenM Paris"
    ]
  }
};

function getResult(){

  if(!answers.weather || !answers.type || !answers.budget){
    alert("Please answer all questions");
    return;
  }

  let dest="bali";

  if(answers.type==="adventure" || answers.budget==="high"){
    dest="dubai";
  }

  if(answers.weather==="cold"){
    dest="paris";
  }

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("img").src=data[dest].img;
  document.getElementById("title").innerText=dest.toUpperCase();
  document.getElementById("desc").innerText=data[dest].desc;

  let html="";
  data[dest].hotels.forEach(h=>{
    html+=`
    <div class="hotel">
      <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
      <div class="hotel-info">
        <h3>${h}</h3>
        <p>Great location • Highly rated</p>
      </div>
    </div>`;
  });

  document.getElementById("hotels").innerHTML=html;
}

</script>

</body>
</html>
