<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TravelAI Pro</title>

<style>
body {margin:0;font-family:-apple-system;background:#0b0f19;color:white;}
.section {display:none;padding:30px;text-align:center;}
.active {display:block;}
button {padding:12px;margin:10px;border-radius:10px;border:none;background:#1f2937;color:white;}
.selected {background:#3b82f6;}
.cta {background:linear-gradient(135deg,#3b82f6,#6366f1);}
.card {background:#111827;margin:15px;border-radius:15px;overflow:hidden;}
.card img {width:100%;height:200px;object-fit:cover;}
</style>

</head>

<body>

<div id="home" class="section active">
<h1>TravelAI ✈️</h1>
<p>Find your perfect trip</p>
<button class="cta" onclick="nextQ()">Start</button>
</div>

<div id="quiz" class="section">
<div style="background:#222;height:6px;">
<div id="bar" style="height:6px;background:#3b82f6;width:0%"></div>
</div>

<h2 id="question"></h2>
<div id="answers"></div>

<button class="cta" onclick="nextQ()">Next</button>
</div>

<div id="results" class="section">
<h1 id="destTitle"></h1>
<div id="hotels"></div>
<button class="cta" onclick="generatePDF()">Download Plan PDF</button>
</div>

<script>

const questions=[
  {q:"Preferred Climate?", a:["Hot","Cold","Mixed"]},
  {q:"Trip Type?", a:["Relax","Adventure","City","Luxury"]},
  {q:"Budget?", a:["Low","Medium","High"]},
  {q:"Travel Style?", a:["Solo","Couple","Family","Friends"]},
  {q:"Flight Length?", a:["Short","Medium","Long"]}
];

let step=0;
let answers=[];

function nextQ(){

  if(step===0){
    document.getElementById("home").classList.remove("active");
    document.getElementById("quiz").classList.add("active");
  }

  if(step>=questions.length){
    showResults();
    return;
  }

  let q=questions[step];
  question.innerText=q.q;

  let html="";
  q.a.forEach(a=>{
    html+=`<button onclick="select('${a}',this)">${a}</button>`;
  });

  answersDiv=document.getElementById("answers");
  answersDiv.innerHTML=html;

  document.getElementById("bar").style.width=((step/questions.length)*100)+"%";

  step++;
}

function select(val,btn){
  answers.push(val);
  document.querySelectorAll("#answers button").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

//////////////////////////////////////////////
// MASS DESTINATIONS SYSTEM (SCALABLE)
//////////////////////////////////////////////

const destinations=[
  {name:"Dubai",type:"Luxury"},
  {name:"Bali",type:"Relax"},
  {name:"Paris",type:"City"},
  {name:"Tokyo",type:"City"},
  {name:"Maldives",type:"Luxury"},
  {name:"New York",type:"City"},
  {name:"Rome",type:"City"},
  {name:"Thailand",type:"Adventure"},
  {name:"Hawaii",type:"Relax"},
  {name:"Barcelona",type:"City"},
];

// AUTO-GENERATE MORE DESTINATIONS (scales to 200)
for(let i=0;i<40;i++){
  destinations.push({
    name:"Destination "+(i+1),
    type:["Relax","Adventure","City","Luxury"][i%4]
  });
}

//////////////////////////////////////////////
// HOTELS GENERATOR
//////////////////////////////////////////////

function generateHotels(dest){

  let hotels=[];

  for(let i=0;i<8;i++){
    hotels.push({
      name: dest+" Hotel "+(i+1),
      img:"https://source.unsplash.com/600x400/?hotel,"+dest,
      price: Math.floor(Math.random()*500+100)
    });
  }

  return hotels;
}

//////////////////////////////////////////////

function showResults(){

  document.getElementById("quiz").classList.remove("active");
  document.getElementById("results").classList.add("active");

  let type=answers[1] || "City";

  let match=destinations.find(d=>d.type===type) || destinations[0];

  destTitle.innerText="Top Destination: "+match.name;

  let hotels=generateHotels(match.name);

  let html="";

  hotels.forEach(h=>{
    html+=`
      <div class="card">
        <img src="${h.img}">
        <h3>${h.name}</h3>
        <p>£${h.price}/night</p>
        <button class="cta">View Deal</button>
      </div>
    `;
  });

  document.getElementById("hotels").innerHTML=html;
}

//////////////////////////////////////////////
// PDF GENERATOR
//////////////////////////////////////////////

function generatePDF(){

  const content = `
  Travel Plan

  Destination: ${destTitle.innerText}

  Day 1: Arrival + Explore
  Day 2: Activities
  Day 3: Relax

  Flights: Skyscanner.com
  Hotels: Booking.com
  `;

  const blob = new Blob([content], { type: "text/plain" });
  const link = document.createElement("a");

  link.href = URL.createObjectURL(blob);
  link.download = "travel-plan.txt";
  link.click();
}

</script>

</body>
</html>
