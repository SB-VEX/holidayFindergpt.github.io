<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holiday Finder ✈️</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

.container {
  max-width:700px;
  margin:auto;
  padding:30px;
  text-align:center;
}

.hidden {display:none;}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  cursor:pointer;
  font-size:16px;
}

button:hover {background:#0ea5e9;}

.progress {
  height:6px;
  background:#1e293b;
  margin-bottom:20px;
}

.bar {
  height:6px;
  background:#38bdf8;
  width:0%;
  transition:0.3s;
}

.card {
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

img {
  width:100%;
  border-radius:10px;
}

.fade {
  animation:fade 0.4s;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>Find Your Perfect Holiday ✈️</h1>

<div class="progress"><div class="bar" id="bar"></div></div>

<div id="q1" class="fade">
<h2>What weather do you prefer?</h2>
<button onclick="next('hot')">Hot ☀️</button>
<button onclick="next('cold')">Cold ❄️</button>
</div>

<div id="q2" class="hidden fade">
<h2>What type of trip?</h2>
<button onclick="next('relax')">Relax 🏖️</button>
<button onclick="next('adventure')">Adventure 🏔️</button>
<button onclick="next('city')">City 🏙️</button>
</div>

<div id="q3" class="hidden fade">
<h2>What’s your budget?</h2>
<button onclick="finish('low')">Low 💸</button>
<button onclick="finish('high')">Luxury 💎</button>
</div>

<div id="result" class="hidden fade">
<h1 id="title"></h1>
<img id="img">
<p id="desc"></p>

<h3>Why this matches you</h3>
<p id="why"></p>

<h2>Top Hotels</h2>
<div id="hotels"></div>

<button onclick="restart()">Start Again</button>
</div>

</div>

<script>

let answers=[];
let step=1;

function updateBar(){
  document.getElementById("bar").style.width=(step*33)+"%";
}

function next(a){
  answers.push(a);
  document.getElementById("q"+step).classList.add("hidden");
  step++;
  document.getElementById("q"+step).classList.remove("hidden");
  updateBar();
}

function finish(a){
  answers.push(a);
  document.getElementById("q3").classList.add("hidden");
  showResult();
}

const data={
  bali:{
    img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
    desc:"A tropical paradise for pure relaxation.",
    why:"You chose warm weather and relaxation — Bali is perfect.",
    hotels:[
      {n:"Four Seasons Bali", t:"Luxury 💎", l:"Ubud", link:"https://www.fourseasons.com"},
      {n:"Bulgari Resort", t:"Luxury 💎", l:"Uluwatu", link:"https://www.bulgarihotels.com"},
      {n:"Ayodya Resort", t:"Mid-range", l:"Nusa Dua", link:"https://www.ayodyaresortbali.com"}
    ]
  },

  paris:{
    img:"https://images.unsplash.com/photo-1502602898657-3e91760cbb34",
    desc:"Romantic, cultural and iconic.",
    why:"You prefer culture and cooler vibes — Paris fits perfectly.",
    hotels:[
      {n:"Ritz Paris", t:"Luxury 💎", l:"Central", link:"https://www.ritzparis.com"},
      {n:"Hotel Regina", t:"Premium", l:"Louvre", link:"https://www.regina-hotel.com"},
      {n:"Ibis Paris", t:"Budget", l:"Various", link:"https://all.accor.com"}
    ]
  },

  dubai:{
    img:"https://images.unsplash.com/photo-1512453979798-5ea266f8880c",
    desc:"Luxury, shopping and adventure.",
    why:"You like excitement and luxury — Dubai delivers both.",
    hotels:[
      {n:"Atlantis The Palm", t:"Luxury 💎", l:"Palm", link:"https://www.atlantis.com"},
      {n:"Burj Al Arab", t:"Ultra Luxury", l:"Jumeirah", link:"https://www.jumeirah.com"},
      {n:"Rove Downtown", t:"Budget", l:"Downtown", link:"https://www.rovehotels.com"}
    ]
  },

  barcelona:{
    img:"https://images.unsplash.com/photo-1505761671935-60b3a7427bad",
    desc:"A vibrant mix of beach and city life.",
    why:"You like balance — culture + relaxation — Barcelona is ideal.",
    hotels:[
      {n:"W Barcelona", t:"Luxury", l:"Beach", link:"https://www.marriott.com"},
      {n:"Hotel Arts", t:"Premium", l:"City", link:"https://www.hotelartsbarcelona.com"},
      {n:"Generator Hostel", t:"Budget", l:"Centre", link:"https://generatorhostels.com"}
    ]
  }
};

function showResult(){

  let score={bali:0,paris:0,dubai:0,barcelona:0};

  answers.forEach(a=>{
    if(a==="hot"){score.bali+=2;score.dubai+=2;}
    if(a==="cold"){score.paris+=2;}
    if(a==="relax"){score.bali+=3;}
    if(a==="adventure"){score.dubai+=3;}
    if(a==="city"){score.paris+=2;score.barcelona+=2;}
    if(a==="low"){score.barcelona+=2;}
    if(a==="high"){score.dubai+=2;}
  });

  let dest=Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);

  document.getElementById("result").classList.remove("hidden");

  document.getElementById("title").innerText=dest.toUpperCase();
  document.getElementById("desc").innerText=data[dest].desc;
  document.getElementById("why").innerText=data[dest].why;
  document.getElementById("img").src=data[dest].img;

  let html="";
  data[dest].hotels.forEach(h=>{
    html+=`
    <div class="card">
      <h3>${h.n}</h3>
      <p>${h.t}</p>
      <p>📍 ${h.l}</p>
      <a href="${h.link}" target="_blank">View Hotel</a>
    </div>`;
  });

  document.getElementById("hotels").innerHTML=html;
}

function restart(){
  location.reload();
}

updateBar();

</script>

</body>
</html>
