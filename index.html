<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holiday Finder</title>

<style>
* {margin:0; padding:0; box-sizing:border-box;}
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
}

/* HERO */
.hero {
  height:100vh;
  background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1 {
  font-size:48px;
  font-weight:600;
}

.hero p {
  margin-top:10px;
  opacity:0.8;
}

.hero button {
  margin-top:20px;
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:white;
  color:black;
  font-size:16px;
  cursor:pointer;
}

/* GLASS CARD */
.glass {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border-radius:20px;
  padding:30px;
  max-width:600px;
  margin:auto;
}

/* QUIZ */
.quiz {
  display:none;
  padding:60px 20px;
  text-align:center;
}

button.option {
  display:block;
  width:100%;
  margin:10px 0;
  padding:15px;
  border-radius:12px;
  border:none;
  background: rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
}

button.option.selected {
  background:white;
  color:black;
}

/* RESULT */
.result {
  display:none;
  padding:40px 20px;
}

.dest-img {
  width:100%;
  border-radius:20px;
}

.hotel {
  display:flex;
  margin-top:15px;
  background:#111;
  border-radius:15px;
  overflow:hidden;
}

.hotel img {
  width:120px;
  object-fit:cover;
}

.hotel-info {
  padding:10px;
}

.hotel-info h3 {
  font-size:16px;
}

.hotel-info p {
  font-size:13px;
  opacity:0.7;
}

.hotel-info button {
  margin-top:5px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:white;
  color:black;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>Find your perfect holiday</h1>
  <p>Personalised in 30 seconds</p>
  <button onclick="start()">Start</button>
</div>

<!-- QUIZ -->
<div class="quiz" id="quiz">
  <div class="glass">
    <h2>Choose your vibe</h2>

    <button class="option" onclick="select(this,'hot')">Hot ☀️</button>
    <button class="option" onclick="select(this,'cold')">Cold ❄️</button>

    <button class="option" onclick="select(this,'relax')">Relax 🏖️</button>
    <button class="option" onclick="select(this,'adventure')">Adventure 🏔️</button>
    <button class="option" onclick="select(this,'city')">City 🏙️</button>

    <button class="option" onclick="select(this,'low')">Budget 💸</button>
    <button class="option" onclick="select(this,'high')">Luxury 💎</button>

    <button onclick="result()">Find my trip</button>
  </div>
</div>

<!-- RESULT -->
<div class="result" id="result">
  <img id="destImg" class="dest-img">
  <h1 id="destName"></h1>
  <p id="destDesc"></p>

  <h2>Top stays</h2>
  <div id="hotels"></div>
</div>

<script>

let answers=[];

function start(){
  document.getElementById("hero").style.display="none";
  document.getElementById("quiz").style.display="block";
}

function select(btn,val){
  btn.classList.toggle("selected");
  answers.push(val);
}

const data={
  bali:{
    img:"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
    desc:"Tropical paradise perfect for relaxation",
    hotels:[
      {name:"Four Seasons Bali",img:"https://images.unsplash.com/photo-1566073771259-6a8506099945"},
      {name:"Bulgari Resort",img:"https://images.unsplash.com/photo-1551882547-ff40c63fe5fa"}
    ]
  },
  dubai:{
    img:"https://images.unsplash.com/photo-1512453979798-5ea266f8880c",
    desc:"Luxury meets adventure",
    hotels:[
      {name:"Atlantis The Palm",img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"},
      {name:"Burj Al Arab",img:"https://images.unsplash.com/photo-1584132967334-10e028bd69f7"}
    ]
  }
};

function result(){

  let dest="bali";
  if(answers.includes("adventure")||answers.includes("high")) dest="dubai";

  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";

  document.getElementById("destImg").src=data[dest].img;
  document.getElementById("destName").innerText=dest.toUpperCase();
  document.getElementById("destDesc").innerText=data[dest].desc;

  let html="";
  data[dest].hotels.forEach(h=>{
    html+=`
    <div class="hotel">
      <img src="${h.img}">
      <div class="hotel-info">
        <h3>${h.name}</h3>
        <p>Premium stay</p>
        <button onclick="alert('Booking coming soon')">View deal</button>
      </div>
    </div>`;
  });

  document.getElementById("hotels").innerHTML=html;
}

</script>

</body>
</html>
