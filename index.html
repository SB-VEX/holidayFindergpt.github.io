<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TravelAI</title>

<style>
body {
  margin:0;
  font-family:-apple-system;
  background:#000;
  color:white;
}

.section {
  display:none;
  padding:30px;
  text-align:center;
}

.active {display:block;}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#111;
  color:white;
  cursor:pointer;
}

button.selected {
  background:white;
  color:black;
}

.cta {
  background:linear-gradient(135deg,#38bdf8,#6366f1);
}

.card {
  background:#111;
  margin:15px 0;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content {
  padding:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="section active">
<h1>TravelAI ✈️</h1>
<p>Find, plan, and book your perfect trip</p>
<button class="cta" onclick="go('quiz')">Start</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="section">

<h2>Weather</h2>
<button onclick="select('weather','hot',this)">Hot</button>
<button onclick="select('weather','cold',this)">Cold</button>

<h2>Trip Type</h2>
<button onclick="select('type','relax',this)">Relax</button>
<button onclick="select('type','adventure',this)">Adventure</button>
<button onclick="select('type','city',this)">City</button>

<h2>Budget</h2>
<button onclick="select('budget','low',this)">Budget</button>
<button onclick="select('budget','high',this)">Luxury</button>

<button class="cta" onclick="getResult()">Find Trip</button>
</div>

<!-- RESULT -->
<div id="result" class="section">
<h1 id="destName"></h1>
<p id="destDesc"></p>

<h2>Top Hotels</h2>
<div id="hotelList"></div>

<button onclick="generatePlan()">✨ Generate Itinerary</button>
</div>

<!-- HOTEL PAGE -->
<div id="hotelPage" class="section">
<img id="hotelImg" style="width:100%">
<h1 id="hotelName"></h1>
<p id="hotelInfo"></p>
<button class="cta">Book Now</button>
<button onclick="go('result')">Back</button>
</div>

<!-- ITINERARY -->
<div id="plan" class="section">
<h1>Your 3-Day Plan</h1>
<div id="planContent"></div>
<button onclick="go('result')">Back</button>
</div>

<script>

let answers={};
let currentDest="";

function go(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function select(cat,val,btn){
  answers[cat]=val;
  let buttons=btn.parentElement.querySelectorAll("button");
  buttons.forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
}

const data={
  bali:{
    desc:"Relax in paradise",
    hotels:[
      {name:"Four Seasons Bali",img:"https://images.unsplash.com/photo-1566073771259-6a8506099945"},
      {name:"Bulgari Resort",img:"https://images.unsplash.com/photo-1551882547-ff40c63fe5fa"}
    ]
  },
  dubai:{
    desc:"Luxury + adventure",
    hotels:[
      {name:"Atlantis The Palm",img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"},
      {name:"Burj Al Arab",img:"https://images.unsplash.com/photo-1584132967334-10e028bd69f7"}
    ]
  }
};

function getResult(){
  currentDest="bali";
  if(answers.type==="adventure"||answers.budget==="high") currentDest="dubai";

  go("result");

  destName.innerText=currentDest.toUpperCase();
  destDesc.innerText=data[currentDest].desc;

  let html="";
  data[currentDest].hotels.forEach((h,i)=>{
    html+=`
    <div class="card" onclick="openHotel(${i})">
      <img src="${h.img}">
      <div class="card-content">
        <h3>${h.name}</h3>
      </div>
    </div>`;
  });

  hotelList.innerHTML=html;
}

function openHotel(i){
  let h=data[currentDest].hotels[i];

  go("hotelPage");

  hotelImg.src=h.img;
  hotelName.innerText=h.name;
  hotelInfo.innerText="Luxury stay • Great reviews";
}

function generatePlan(){
  go("plan");

  planContent.innerHTML=`
  <p>Day 1: Arrival + explore city</p>
  <p>Day 2: Main attractions</p>
  <p>Day 3: Relax + departure</p>
  `;
}

</script>

</body>
</html>
