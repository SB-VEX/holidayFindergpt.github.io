<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Holiday Finder ✈️</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.container {
  max-width:800px;
  margin:auto;
  padding:30px;
  text-align:center;
}

button {
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  cursor:pointer;
  font-size:16px;
}

button:hover {background:#0ea5e9;}

.hidden {display:none;}

.card {
  background:#1e293b;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:60%;
}

.cta {
  background:#22c55e;
  color:black;
}

.tag {
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>Find Your Perfect Holiday ✈️</h1>

<div id="quiz">
<p>Weather?</p>
<button onclick="answer('hot')">Hot</button>
<button onclick="answer('cold')">Cold</button>

<p>Trip type?</p>
<button onclick="answer('relax')">Relax</button>
<button onclick="answer('adventure')">Adventure</button>
<button onclick="answer('city')">City</button>

<p>Budget?</p>
<button onclick="answer('low')">Low</button>
<button onclick="answer('high')">Luxury</button>

<br><br>
<button onclick="getResult()">Find My Trip</button>
</div>

<div id="result" class="hidden">
<h1 id="title"></h1>
<p id="desc"></p>
<p id="why"></p>

<p style="color:#22c55e;">🔥 Popular choice right now</p>

<h2>Top Hotels</h2>
<div id="hotels"></div>

<h3>Get a full travel plan ✈️</h3>
<input id="email" placeholder="Enter your email">
<br>
<button class="cta" onclick="captureEmail()">Send My Plan</button>

<br><br>
<button onclick="restart()">Start Again</button>
</div>

</div>

<script>

let answers=[];

function answer(a){
  answers.push(a);
}

const data={
  bali:{
    desc:"Relax in a tropical paradise.",
    why:"Perfect for your warm + relaxation preferences.",
    hotels:[
      {n:"Four Seasons Bali",tag:"Luxury 💎",link:"#"},
      {n:"Bulgari Resort",tag:"Luxury 💎",link:"#"},
      {n:"Ayodya Resort",tag:"Mid-range",link:"#"},
      {n:"Kuta Beach Hotel",tag:"Budget",link:"#"}
    ]
  },

  paris:{
    desc:"Romantic and cultural escape.",
    why:"Ideal for city lovers and cooler climates.",
    hotels:[
      {n:"Ritz Paris",tag:"Luxury 💎",link:"#"},
      {n:"Hotel Regina",tag:"Premium",link:"#"},
      {n:"Ibis Paris",tag:"Budget",link:"#"}
    ]
  },

  dubai:{
    desc:"Luxury and adventure combined.",
    why:"Matches your high-energy + luxury vibe.",
    hotels:[
      {n:"Atlantis The Palm",tag:"Luxury 💎",link:"#"},
      {n:"Burj Al Arab",tag:"Ultra Luxury",link:"#"},
      {n:"Rove Downtown",tag:"Budget",link:"#"}
    ]
  },

  barcelona:{
    desc:"Beach meets city life.",
    why:"Balanced lifestyle destination.",
    hotels:[
      {n:"W Barcelona",tag:"Luxury",link:"#"},
      {n:"Hotel Arts",tag:"Premium",link:"#"},
      {n:"Generator Hostel",tag:"Budget",link:"#"}
    ]
  },

  tokyo:{
    desc:"Futuristic city experience.",
    why:"Perfect for exploring something new.",
    hotels:[
      {n:"Park Hyatt Tokyo",tag:"Luxury",link:"#"},
      {n:"Shibuya Excel Hotel",tag:"Mid-range",link:"#"},
      {n:"Capsule Hotel",tag:"Budget",link:"#"}
    ]
  },

  rome:{
    desc:"Historic and cultural journey.",
    why:"Great for history and food lovers.",
    hotels:[
      {n:"Hotel Eden",tag:"Luxury",link:"#"},
      {n:"NH Collection Roma",tag:"Mid-range",link:"#"},
      {n:"Budget Inn Rome",tag:"Budget",link:"#"}
    ]
  }
};

function getResult(){

  let score={bali:0,paris:0,dubai:0,barcelona:0,tokyo:0,rome:0};

  answers.forEach(a=>{
    if(a==="hot"){score.bali+=2;score.dubai+=2;}
    if(a==="cold"){score.paris+=2;}
    if(a==="relax"){score.bali+=3;}
    if(a==="adventure"){score.dubai+=3;score.tokyo+=2;}
    if(a==="city"){score.paris+=2;score.barcelona+=2;score.tokyo+=2;score.rome+=2;}
    if(a==="low"){score.barcelona+=2;score.rome+=2;}
    if(a==="high"){score.dubai+=2;}
  });

  let dest=Object.keys(score).reduce((a,b)=>score[a]>score[b]?a:b);

  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("title").innerText=dest.toUpperCase();
  document.getElementById("desc").innerText=data[dest].desc;
  document.getElementById("why").innerText=data[dest].why;

  let html="";
  data[dest].hotels.forEach(h=>{
    html+=`
    <div class="card">
      <h3>${h.n}</h3>
      <p class="tag">${h.tag}</p>
      <button class="cta">Book Best Price</button>
    </div>`;
  });

  document.getElementById("hotels").innerHTML=html;
}

function captureEmail(){
  let email=document.getElementById("email").value;
  if(email){
    alert("Travel plan sent to "+email);
  }
}

function restart(){
  location.reload();
}

</script>

</body>
</html>
